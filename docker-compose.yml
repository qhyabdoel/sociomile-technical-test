version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sociomile-db
    restart: always
    environment:
      MYSQL_DATABASE: sociomile_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: user_kiki
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Opsional: Auto-run skema tabel saat startup
      - ./backend/migrations:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sociomile-api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=user_kiki
      - DB_PASSWORD=userpassword
      - DB_NAME=sociomile_db
      - JWT_SECRET=supersecretkeykiki

volumes:
  db_data:
